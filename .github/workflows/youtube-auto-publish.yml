name: 유튜브 무인 자동발행 (매일 9시 KST)

# 무인 심장: GitHub 클라우드가 정시에 jenya 서버의 발행창구를 호출.
#   - 매일 00:00 UTC = 09:00 KST 자동
#   - workflow_dispatch: GitHub 화면 "Run workflow" 버튼으로 수동 실행
#   - push(자기파일): 이 워크플로 파일을 수정·푸시하면 1회 자동실행(자가검증용)
# CRON_KEY는 깃허브 저장소 Secrets(Settings→Secrets and variables→Actions)에 등록 필요.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/youtube-auto-publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 다음 쇼츠 1개 유튜브 직접발행 + 0-3 검증
        env:
          CRON_KEY: ${{ secrets.CRON_KEY }}
        run: |
          for i in 1 2 3; do
            echo "=== 시도 $i ==="
            RESP=$(curl -sS -X POST 'https://jenya.onrender.com/youtube/publish-next' \
              -H "x-cron-key: ${CRON_KEY}" \
              -H 'Content-Type: application/json' \
              -d '{"count":1,"privacy":"public"}' \
              --max-time 180 || true)
            echo "응답: $RESP"
            if echo "$RESP" | grep -q '"verified":1'; then echo "✅ 발행+검증 성공"; exit 0; fi
            if echo "$RESP" | grep -q '"published":0'; then echo "ℹ️ 올릴 쇼츠 없음(정상)"; exit 0; fi
            sleep 30
          done
          echo "❌ 실패 — 확인 필요 (CRON_KEY 시크릿 등록 여부·서버 상태 확인)"; exit 1
