name: 유튜브 무인 자동발행 깨우기 (매일 9시 KST)

# 무인 심장: GitHub 클라우드가 매일 9시 KST에 jenya 서버를 '깨우기만' 한다(비밀키 불필요).
#   서버가 깨면 서버 내부 스케줄러가 9시 이후 첫 기회에 쇼츠 1개를 직접발행·검증한다.
#   발행 결정·업로드·검증·키·OAuth는 전부 서버 안에 있으므로 GitHub엔 시크릿이 필요 없다.
#   - 9:00·9:05·9:10 KST 세 번 깨움(무료 Render 콜드스타트 흡수)
#   - workflow_dispatch: 수동 실행 버튼
#   - push(자기파일): 이 파일 수정·푸시 시 1회 자동실행(자가검증)
on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '5 0 * * *'
    - cron: '10 0 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/youtube-auto-publish.yml'

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: jenya 서버 깨우기 (3회 재시도로 콜드스타트 흡수)
        run: |
          for i in 1 2 3 4; do
            echo "=== 깨우기 시도 $i ==="
            RESP=$(curl -sS 'https://jenya.onrender.com/youtube/wake' --max-time 180 || true)
            echo "응답: $RESP"
            echo "$RESP" | grep -q '"woke":true' && { echo "✅ 서버 깨어남"; break; }
            sleep 30
          done
